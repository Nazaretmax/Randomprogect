// ── Voice preload (elimina ritardo al primo avvio) ─────────────────────────
let _voicesLoaded=false;
function preloadVoices(){
  if(!('speechSynthesis' in window)||_voicesLoaded)return;
  const voices=window.speechSynthesis.getVoices();
  if(voices.length){_voicesLoaded=true;return;}
  window.speechSynthesis.addEventListener('voiceschanged',()=>{window.speechSynthesis.getVoices();_voicesLoaded=true;},{once:true});
  // Trick: speak a silent utterance to wake up the engine
  const u=new SpeechSynthesisUtterance('');u.volume=0;window.speechSynthesis.speak(u);
}
preloadVoices();

// ── Audio ──────────────────────────────────────────────────────────────────
class AudioCtrl{
  constructor(){
    this.ctx=null;this.musicInterval=null;this.isPlaying=false;this.noteIdx=0;
    this.musicTrack='default';
    this.deathPhrase='sei morto';   // testo da pronunciare
    this.deathLang='it-IT';         // lingua BCP-47
  }
  init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume();}
  tone(f,type,dur,vol=0.1,slide){if(!this.ctx)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.connect(g);g.connect(this.ctx.destination);o.frequency.setValueAtTime(f,this.ctx.currentTime);if(slide)o.frequency.exponentialRampToValueAtTime(slide,this.ctx.currentTime+dur);g.gain.setValueAtTime(vol,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+dur);o.start();o.stop(this.ctx.currentTime+dur);}
  playJump(){this.init();this.tone(150,'square',.2,.05,600);}
  playScore(combo){this.init();const b=800+Math.min(combo,10)*40;this.tone(b,'sine',.08,.04,b*1.5);}
  playComboTier(tier){this.init();for(let i=0;i<tier;i++)setTimeout(()=>this.tone(600+i*200,'square',.1,.06,1000+i*200),i*80);}
  playGameOver(){this.init();this.tone(300,'sawtooth',.5,.1,50);}
  playVoiceOver(){
    if(!('speechSynthesis' in window))return;
    // Annulla qualsiasi cosa in corso e parla subito
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(this.deathPhrase);
    u.lang=this.deathLang;
    u.pitch=0.25;
    u.rate=0.78;
    u.volume=1;
    // Prova a scegliere una voce nativa della lingua
    const voices=window.speechSynthesis.getVoices();
    const native=voices.find(v=>v.lang.startsWith(this.deathLang.split('-')[0])&&!v.name.includes('Google'));
    const fallback=voices.find(v=>v.lang.startsWith(this.deathLang.split('-')[0]));
    if(native||fallback)u.voice=native||fallback;
    window.speechSynthesis.speak(u);
  }
  startMusic(getSpeed){
    this.init();if(this.isPlaying)return;this.isPlaying=true;
    let notes=[220,220,330,220,261.63,220,196,220],type='square';
    if(this.musicTrack==='synthwave'){notes=[110,110,164.81,110,130.81,110,98,110];type='sawtooth';}
    else if(this.musicTrack==='rock'){notes=[164.81,196,220,164.81,261.63,220,196,164.81];type='triangle';}
    const next=()=>{if(!this.isPlaying||!this.ctx)return;this.tone(notes[this.noteIdx%notes.length]/2,type,.1,.02);this.noteIdx++;this.musicInterval=setTimeout(next,Math.max(80,250-(getSpeed()*10)));};
    next();
  }
  stopMusic(){this.isPlaying=false;if(this.musicInterval)clearTimeout(this.musicInterval);}
}

class GameEngine{
  constructor(canvas){
    this.canvas=canvas;this.ctx=canvas.getContext('2d');
    this.audio=new AudioCtrl();
    this.running=false;this.isDead=false;this.isTutorial=false;this.rafId=0;
    this.ninja={x:100,y:360,lane:'BOTTOM',isJumping:false,targetLane:'BOTTOM',color:'#e11d48'};
    this.trail=[];this.obstacles=[];this.powerups=[];this.particles=[];this.scorePopups=[];
    this.speed=7;this.maxSpeed=20;this.speedInc=0.15;
    this.score=0;this.sessionCoins=0;this.dodgedObstacles=0;
    this.combo=0;this.maxCombo=0;this.prevTierIdx=0;
    this.spawnTimer=100;this.powerupTimer=200;
    this.tutorialSpawned=false;this.tutorialSuccess=false;this.tutorialSuccessTimer=0;
    this.activePowerUp=null;
    this.shakeTime=0;this.shakeIntensity=0;this.flashTime=0;this.flashColor='rgba(239,68,68,';
    this.bgPhase=0;this.cityOffset=0;this.windowFlickerTimer=0;
    this.initBg();this.draw();
  }
  initBg(){
    this.stars=[];
    for(let i=0;i<60;i++)this.stars.push({x:Math.random()*800,y:50+Math.random()*300,spd:.3,sz:.8,a:.4+Math.random()*.3});
    for(let i=0;i<30;i++)this.stars.push({x:Math.random()*800,y:50+Math.random()*300,spd:.7,sz:1.3,a:.5+Math.random()*.3});
    for(let i=0;i<12;i++)this.stars.push({x:Math.random()*800,y:50+Math.random()*300,spd:1.5,sz:2,a:.7+Math.random()*.3});
    this.bldBot=[];this.bldTop=[];
    let x=0;
    while(x<800){const w=Math.max(15,20+Math.floor(Math.random()*60)),h=12+Math.floor(Math.random()*36);
      const wins=[];for(let wy=4;wy<h-4;wy+=7)for(let wx=3;wx<w-3;wx+=7)if(Math.random()>.35)wins.push({lx:wx,ly:wy,on:Math.random()>.4});
      this.bldBot.push({x,w,h,wins});x+=w;}
    if(this.bldBot.length){const l=this.bldBot[this.bldBot.length-1];l.w=800-l.x;}
    x=0;
    while(x<800){const w=Math.max(15,20+Math.floor(Math.random()*55)),h=10+Math.floor(Math.random()*28);this.bldTop.push({x,w,h});x+=w;}
    if(this.bldTop.length){const l=this.bldTop[this.bldTop.length-1];l.w=800-l.x;}
  }

// ── ErrorBoundary ──────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){if(this.state.err)return<div className="flex items-center justify-center h-screen bg-slate-950 text-white p-8 text-center"><div><p className="text-red-500 text-xl mb-4">{this.state.err.message}</p><button onClick={()=>window.location.reload()} className="mt-4 bg-slate-800 px-6 py-2 rounded-lg">Reload</button></div></div>;return this.props.children;}
}

// ── AchievementPopup ───────────────────────────────────────────────────────
function AchievementPopup({ach,onDone}){
  const [out,setOut]=useState(false);
  useEffect(()=>{
    const t1=setTimeout(()=>setOut(true),2800);
    const t2=setTimeout(onDone,3200);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);
  return(
    <div className={`${out?'ach-out':'ach-in'} flex items-center gap-3 pointer-events-none`}
         style={{background:'rgba(5,20,40,.92)',border:'1px solid rgba(6,182,212,.3)',borderLeft:'3px solid #06b6d4',backdropFilter:'blur(12px)',borderRadius:'14px',padding:'10px 16px',boxShadow:'0 8px 30px rgba(0,0,0,.5)'}}>
      <span style={{fontSize:24}}>{ach.icon}</span>
      <div>
        <p style={{color:'#06b6d4',fontSize:10,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>OBIETTIVO</p>
        <p style={{color:'#fff',fontFamily:"'Bebas Neue'",fontSize:18,lineHeight:1}}>{ach.title}</p>
      </div>
    </div>
  );
}

  // achProgress: {[id]: {progress, unlocked}}
  const [achProgress,setAchProgress]=useState({});
  const canvasRef=useRef(null);
  const engineRef=useRef(null);
  const gameStateRef=useRef(gameState);
  useEffect(()=>{gameStateRef.current=gameState;},[gameState]);
  const t=T[lang]||T.en;

  // Re-sync audio config whenever language changes
  useEffect(()=>{
    if(!engineRef.current||!profile)return;
    engineRef.current.setAudioConfig(
      profile.selectedMusic||'default',
      profile.selectedDeathPhrase||'default',
      lang
    );
  },[lang,profile]);

  // ── Load everything from localStorage ────────────────────────────────────
  useEffect(()=>{
    // Language
    const bl=navigator.language.split('-')[0];if(T[bl])setLang(bl);
    // Profile
    const p=LS.get('ninja_profile',DEFAULT_PROFILE);setProfile(p);setCoins(p.coins);
    // Achievement progress
    const ap=LS.get('ninja_achievements',{});setAchProgress(ap);
    // Daily challenge
    const today=new Date().toDateString();
    const saved=LS.get('ninja_daily_'+today,null);
    if(saved){setDailyChallenge(saved);}
    else{
      const chs=[
        {desc:'Raccogli 20 monete in una run',target:20,reward:50,type:'coins'},
        {desc:'Raggiungi 50 punti',target:50,reward:100,type:'score'},
        {desc:'Schiva 50 ostacoli',target:50,reward:75,type:'dodge'},
        {desc:'Ottieni un combo di 8',target:8,reward:80,type:'combo'},
      ];
      const r=chs[Math.floor(Math.random()*chs.length)];
      const nc={...r,progress:0,completed:false};
      LS.set('ninja_daily_'+today,nc);setDailyChallenge(nc);
    }
    setGameState(localStorage.getItem('tutorialCompleted')==='true'?'START':'TUTORIAL_PROMPT');
  },[]);

  // ── Canvas resize ─────────────────────────────────────────────────────────
  useEffect(()=>{
    const resize=()=>{const c=canvasRef.current;if(!c)return;const S=Math.min(window.innerWidth/800,window.innerHeight/450);c.style.width=Math.round(800*S)+'px';c.style.height=Math.round(450*S)+'px';};
    resize();
    window.addEventListener('resize',resize);
    window.addEventListener('orientationchange',()=>setTimeout(resize,100));
    return()=>window.removeEventListener('resize',resize);
  },[]);

  // ── Portrait lock ─────────────────────────────────────────────────────────
  useEffect(()=>{try{if(screen.orientation?.lock)screen.orientation.lock('portrait').catch(()=>{});}catch(e){}});

  // ── Global tap → forward to engine if playing ─────────────────────────────
  useEffect(()=>{
    const onDown=(e)=>{
      const st=gameStateRef.current;
      if(st==='PLAYING'||st==='TUTORIAL_PLAYING'){
        // Ignore taps on interactive UI elements
        const tag=(e.target?.tagName||'').toLowerCase();
        if(tag==='button'||tag==='select'||tag==='input')return;
        e.preventDefault();
        engineRef.current?.tap();
      }
    };
    window.addEventListener('mousedown',onDown);
    window.addEventListener('touchstart',onDown,{passive:false});
    return()=>{window.removeEventListener('mousedown',onDown);window.removeEventListener('touchstart',onDown);};
  },[]);

  // ── Save profile helper ───────────────────────────────────────────────────
  const saveProfile=useCallback((up)=>{
    setProfile(up);setCoins(up.coins);
    LS.set('ninja_profile',up);
  },[]);

  // ── Achievement checker ───────────────────────────────────────────────────
  const checkAchievements=useCallback((score,combo,dodge,coins,totalCoins,currentAp)=>{
    const ap={...currentAp};
    const newlyUnlocked=[];
    for(const ach of ACHIEVEMENTS){
      if(ap[ach.id]?.unlocked)continue;
      let val=0;
      if(ach.type==='score')val=score;
      else if(ach.type==='combo')val=combo;
      else if(ach.type==='dodge')val=dodge;
      else if(ach.type==='coins')val=coins;
      else if(ach.type==='total_coins')val=totalCoins;
      const prev=ap[ach.id]?.progress||0;
      const newProg=Math.max(prev,val);
      ap[ach.id]={progress:newProg,unlocked:newProg>=ach.target};
      if(ap[ach.id].unlocked&&!currentAp[ach.id]?.unlocked)newlyUnlocked.push(ach);
    }
    LS.set('ninja_achievements',ap);
    setAchProgress(ap);
    if(newlyUnlocked.length)setAchQueue(q=>[...q,...newlyUnlocked]);
    return ap;
  },[]);

  // ── Engine setup ──────────────────────────────────────────────────────────
  useEffect(()=>{
    if(canvasRef.current&&!engineRef.current)engineRef.current=new GameEngine(canvasRef.current);
    if(!engineRef.current)return;
    engineRef.current.setCallbacks(
      // onScore
      (s)=>{
        setScore(s);
        // Live check score-based achievements
        setAchProgress(ap=>{
          const mc=engineRef.current?.maxCombo||0;
          const dc=engineRef.current?.dodgedObstacles||0;
          const sc=engineRef.current?.sessionCoins||0;
          checkAchievements(s,mc,dc,sc,(profile?.coins||0),ap);
          return ap;
        });
      },
      // onGameOver
      async(finalScore,sCoins,dodged,maxCombo)=>{
        setGameState('GAME_OVER');setActivePowerUp(null);setCombo(0);
        const maxCoins=Math.floor(finalScore/2)+10,validCoins=Math.min(sCoins,maxCoins);
        const isNewRecord=finalScore>(profile?.highScore||0)&&finalScore>0;
        setSessionStats({maxCombo,obstacles:dodged,coins:validCoins,isNewRecord});
        // Update daily challenge
        let chalReward=0;
        if(dailyChallenge&&!dailyChallenge.completed){
          let np=dailyChallenge.progress;
          if(dailyChallenge.type==='coins')np+=validCoins;
          else if(dailyChallenge.type==='score')np=Math.max(np,finalScore);
          else if(dailyChallenge.type==='dodge')np+=dodged;
          else if(dailyChallenge.type==='combo')np=Math.max(np,maxCombo);
          const done=np>=dailyChallenge.target;if(done)chalReward=dailyChallenge.reward;
          const uc={...dailyChallenge,progress:np,completed:done};
          LS.set('ninja_daily_'+new Date().toDateString(),uc);
          setDailyChallenge(uc);
        }
        if(profile){
          const newCoins=profile.coins+validCoins+chalReward;
          const newHS=Math.max(profile.highScore,finalScore);
          const up={...profile,coins:newCoins,highScore:newHS};
          saveProfile(up);
          // Final achievement check with total coins
          setAchProgress(ap=>checkAchievements(finalScore,maxCombo,dodged,validCoins,newCoins,ap));
        }
      },
      ()=>{localStorage.setItem('tutorialCompleted','true');setGameState('START');},
      ()=>{},
      (type)=>setActivePowerUp(type),
      ()=>setActivePowerUp(null),
      (c)=>setCombo(c),
    );
    return()=>{if(engineRef.current)engineRef.current.stop();};
  },[profile,dailyChallenge,checkAchievements,saveProfile]);

  const startGame=()=>{setGameState('PLAYING');setScore(0);setCombo(0);setActivePowerUp(null);engineRef.current?.start(false);};
  const startTutorial=()=>{setGameState('TUTORIAL_PLAYING');setScore(0);engineRef.current?.start(true);};
  const skipTutorial=()=>{localStorage.setItem('tutorialCompleted','true');setGameState('START');};
  const shareScore=async()=>{const txt=`Ho schivato ostacoli in Ninja Revers con ${score} punti!`;if(navigator.share)try{await navigator.share({title:'Ninja Revers',text:txt});}catch(e){}else{navigator.clipboard?.writeText(txt);alert('Copiato!');}};
  const buySkin=async(id,price)=>{if(!profile||profile.coins<price||profile.unlockedSkins.includes(id))return;saveProfile({...profile,coins:profile.coins-price,unlockedSkins:[...profile.unlockedSkins,id]});};
  const selectSkin=async(id)=>{if(!profile?.unlockedSkins.includes(id))return;saveProfile({...profile,selectedSkin:id});const s=SKINS.find(s=>s.id===id);if(s&&engineRef.current)engineRef.current.setNinjaColor(s.color);};
  const buyAudio=async(type,id,price)=>{if(!profile||profile.coins<price)return;const ul=type==='music'?profile.unlockedMusic:profile.unlockedDeathPhrases;if(ul.includes(id))return;const nu=[...ul,id];saveProfile(type==='music'?{...profile,coins:profile.coins-price,unlockedMusic:nu}:{...profile,coins:profile.coins-price,unlockedDeathPhrases:nu});};
  const selectAudio=async(type,id)=>{if(!profile)return;const ul=type==='music'?profile.unlockedMusic:profile.unlockedDeathPhrases;if(!ul.includes(id))return;const up=type==='music'?{...profile,selectedMusic:id}:{...profile,selectedDeathPhrase:id};saveProfile(up);if(engineRef.current){const m=type==='music'?id:profile.selectedMusic;const dp=type==='deathPhrase'?id:profile.selectedDeathPhrase;engineRef.current.setAudioConfig(m,dp,lang);}};

  const isPlaying=gameState==='PLAYING'||gameState==='TUTORIAL_PLAYING';
  const isMenu=gameState==='START'||gameState==='GAME_OVER'||gameState==='LEADERBOARD'||gameState==='SHOP'||gameState==='ACHIEVEMENTS';
  const grade=getGrade(score);
  const tier=getComboTier(combo);
  const PW={INVINCIBILITY:t.powerupInvincible,MULTIPLIER:t.powerupMultiplier,SLOW_MO:t.powerupSlowMo,MAGNET:t.powerupMagnet};
  const PC={INVINCIBILITY:'#fbbf24',MULTIPLIER:'#c084fc',SLOW_MO:'#22d3ee',MAGNET:'#06b6d4'};

  // Total/unlocked achievements
  const totalAch=ACHIEVEMENTS.length;
  const unlockedAch=ACHIEVEMENTS.filter(a=>achProgress[a.id]?.unlocked).length;

  return(
    <ErrorBoundary>
      <div className="relative w-full bg-slate-950 overflow-hidden touch-none select-none flex items-center justify-center"
           style={{height:'100%',width:'100%',position:'fixed',top:0,left:0}}>

        {/* Canvas */}
        <canvas id="game-canvas" ref={canvasRef} width={800} height={450}
          style={{opacity:(isPlaying||gameState==='GAME_OVER')?1:0,transition:'opacity .5s'}}/>

        {/* Menu background glow */}
        {!isPlaying&&(
          <div className="absolute inset-0 pointer-events-none z-0">
            <div style={{background:'radial-gradient(ellipse at 20% 30%, rgba(6,182,212,.08) 0%, transparent 60%),radial-gradient(ellipse at 80% 70%, rgba(16,185,129,.06) 0%, transparent 60%)',position:'absolute',inset:0}}/>
            <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.04}} xmlns="http://www.w3.org/2000/svg"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#06b6d4"/></pattern></defs><rect width="100%" height="100%" fill="url(#g)"/></svg>
          </div>
        )}

        {/* Top-right HUD for menus: coins */}
        {isMenu&&(
          <div className="absolute top-0 right-0 flex items-center gap-2 z-20 pointer-events-auto"
               style={{padding:'max(12px,env(safe-area-inset-top)) 12px 0 0'}}>
            <div className="glass border border-yellow-500/20 text-yellow-400 px-3 py-2 rounded-xl flex items-center gap-1.5 font-bold text-base shadow-lg">
              <CoinsIcon c="w-4 h-4"/>{coins}
            </div>
          </div>
        )}

        {/* Overlays */}
        <div className="absolute inset-0 flex flex-col items-center justify-center z-10 pointer-events-none">

          {/* Tutorial */}
          {gameState==='TUTORIAL_PROMPT'&&(
            <div className="glass border-glow rounded-3xl p-8 text-center max-w-sm pointer-events-auto shadow-2xl mx-4 anim-scale-in"
                 style={{border:'1px solid rgba(6,182,212,.2)'}}>
              <div className="text-5xl mb-4 anim-float">🥷</div>
              <h2 style={{fontFamily:"'Bebas Neue'",fontSize:38,color:'white',marginBottom:10}}>Tutorial</h2>
              <p className="text-slate-300 mb-8 text-base leading-relaxed">{t.tutorialPrompt}</p>
              <div className="flex flex-col gap-3">
                <button onClick={startTutorial} className="bg-cyan-700 hover:bg-cyan-600 text-white py-4 rounded-2xl font-bold text-lg transition-all active:scale-95">{t.startTutorial}</button>
                <button onClick={skipTutorial} className="glass text-slate-400 hover:text-white py-3 rounded-2xl font-semibold transition-all active:scale-95" style={{border:'1px solid rgba(100,116,139,.4)'}}>{t.skip}</button>
              </div>
            </div>
          )}

          {/* START */}
          {gameState==='START'&&(
            <div className="pointer-events-auto text-center flex flex-col items-center z-10 px-4 anim-slide-up">
              <div className="anim-float mb-2">
                <h1 style={{fontFamily:"'Bebas Neue'",fontSize:'clamp(60px,12vw,110px)',letterSpacing:'0.02em',color:'white',filter:'drop-shadow(0 0 30px rgba(6,182,212,.4))',lineHeight:1}}>
                  NINJA<br/><span className="text-shimmer">REVERS</span>
                </h1>
              </div>

              {dailyChallenge&&(
                <div className="glass mb-8 max-w-xs w-full anim-scale-in"
                     style={{border:'1px solid rgba(234,179,8,.2)',borderRadius:16,padding:'14px 16px'}}>
                  <div className="flex items-center justify-between mb-2">
                    <span style={{color:'#facc15',fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1,display:'flex',alignItems:'center',gap:6}}><Trophy c="w-3 h-3"/>{t.dailyChallenge}</span>
                    <span style={{color:'#34d399',fontSize:12,fontWeight:700}}>+{dailyChallenge.reward} 🪙</span>
                  </div>
                  <p style={{color:'white',fontSize:13,marginBottom:8}}>{dailyChallenge.desc}</p>
                  <div style={{background:'rgba(5,13,26,.8)',borderRadius:6,height:6,overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:6,background:dailyChallenge.completed?'#10b981':'#eab308',width:`${Math.min(100,(dailyChallenge.progress/dailyChallenge.target)*100)}%`,transition:'width .4s'}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#64748b',fontWeight:600,marginTop:4}}>
                    <span>{dailyChallenge.progress}/{dailyChallenge.target}</span>
                    {dailyChallenge.completed&&<span style={{color:'#34d399'}}>{t.completed}</span>}
                  </div>
                </div>
              )}

              <button onClick={startGame}
                style={{fontFamily:"'Bebas Neue'",fontSize:42,color:'white',padding:'16px 80px',borderRadius:999,marginBottom:28,background:'linear-gradient(135deg,#0891b2,#10b981)',boxShadow:'0 0 40px rgba(6,182,212,.4),0 8px 30px rgba(0,0,0,.5)',border:'none',cursor:'pointer',transition:'transform .15s'}}
                onMouseEnter={e=>e.target.style.transform='scale(1.04)'}
                onMouseLeave={e=>e.target.style.transform='scale(1)'}
                onMouseDown={e=>e.stopPropagation()}>
                {t.play}
              </button>

              <div className="flex gap-4 mb-6">
                {[
                  {label:t.shop,icon:<Bag c="w-6 h-6 text-cyan-400"/>,state:'SHOP',col:'rgba(6,182,212,.5)'},
                  {label:t.achievements,icon:<AchIco c="w-6 h-6 text-yellow-400"/>,state:'ACHIEVEMENTS',col:'rgba(234,179,8,.5)',badge:`${unlockedAch}/${totalAch}`},
                ].map(b=>(
                  <button key={b.state} onClick={()=>setGameState(b.state)} onMouseDown={e=>e.stopPropagation()}
                    className="glass flex flex-col items-center gap-2 p-4 rounded-2xl transition-all active:scale-95"
                    style={{border:`1px solid rgba(100,116,139,.3)`,minWidth:90,cursor:'pointer'}}>
                    {b.icon}
                    <span style={{color:'#cbd5e1',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>{b.label}</span>
                    {b.badge&&<span style={{background:'rgba(234,179,8,.15)',color:'#fbbf24',fontSize:10,fontWeight:700,borderRadius:99,padding:'1px 8px',border:'1px solid rgba(234,179,8,.2)'}}>{b.badge}</span>}
                  </button>
                ))}
              </div>

              {/* Lang + best score */}
              <div className="flex items-center gap-3">
                <select value={lang} onChange={e=>setLang(e.target.value)} onMouseDown={e=>e.stopPropagation()}
                  style={{background:'rgba(5,20,40,.8)',color:'#94a3b8',border:'1px solid rgba(100,116,139,.3)',borderRadius:10,padding:'6px 10px',fontSize:12,fontWeight:700,outline:'none',cursor:'pointer'}}>
                  {Object.keys(T).map(l=><option key={l} value={l}>{l.toUpperCase()}</option>)}
                </select>
                <div style={{background:'rgba(5,20,40,.7)',border:'1px solid rgba(100,116,139,.25)',borderRadius:10,padding:'6px 14px',display:'flex',alignItems:'center',gap:6}}>
                  <Trophy c="w-3 h-3 text-yellow-400"/>
                  <span style={{color:'#facc15',fontFamily:"'Bebas Neue'",fontSize:18,lineHeight:1}}>{profile?.highScore||0}</span>
                </div>
              </div>
            </div>
          )}

          {/* ACHIEVEMENTS */}
          {gameState==='ACHIEVEMENTS'&&(
            <div className="glass rounded-3xl w-full max-w-sm pointer-events-auto shadow-2xl mx-4 flex flex-col anim-scale-in"
                 style={{maxHeight:'88vh',padding:'1.5rem',border:'1px solid rgba(6,182,212,.2)'}}>
              <h2 style={{fontFamily:"'Bebas Neue'",fontSize:36,color:'white',textAlign:'center',marginBottom:4,display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
                <AchIco c="w-7 h-7 text-yellow-400"/>{t.achievements}
              </h2>
              <p style={{color:'#64748b',textAlign:'center',fontSize:13,fontWeight:600,marginBottom:16}}>
                {unlockedAch}/{totalAch} sbloccati
              </p>
              <div className="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-1">
                {ACHIEVEMENTS.map(ach=>{
                  const ap=achProgress[ach.id]||{progress:0,unlocked:false};
                  const pct=Math.min(100,(ap.progress/ach.target)*100);
                  return(
                    <div key={ach.id} style={{borderRadius:14,padding:'12px 14px',background:ap.unlocked?'rgba(6,182,212,.08)':'rgba(5,13,26,.6)',border:`1px solid ${ap.unlocked?'rgba(6,182,212,.3)':'rgba(100,116,139,.2)'}`,display:'flex',alignItems:'center',gap:12}}>
                      <span style={{fontSize:26,opacity:ap.unlocked?1:.4}}>{ach.icon}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                          <p style={{color:ap.unlocked?'#e2e8f0':'#64748b',fontWeight:700,fontSize:14}}>{ach.title}</p>
                          {ap.unlocked&&<span style={{color:'#06b6d4',fontSize:11,fontWeight:700}}>✓</span>}
                        </div>
                        <p style={{color:'#475569',fontSize:11,marginBottom:6}}>{ach.desc}</p>
                        <div style={{background:'rgba(5,13,26,.8)',borderRadius:4,height:4,overflow:'hidden'}}>
                          <div style={{height:'100%',borderRadius:4,background:ap.unlocked?'#06b6d4':'#334155',width:`${pct}%`,transition:'width .4s'}}/>
                        </div>
                        <p style={{color:'#475569',fontSize:10,fontWeight:600,marginTop:3}}>{ap.progress}/{ach.target}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
              <button onClick={()=>setGameState('START')} onMouseDown={e=>e.stopPropagation()}
                style={{marginTop:16,background:'rgba(30,41,59,.8)',border:'1px solid rgba(100,116,139,.3)',color:'white',padding:'14px',borderRadius:16,fontWeight:700,fontSize:15,cursor:'pointer',width:'100%'}}>
                {t.menu}
              </button>
            </div>
          )}

          {/* SHOP */}
          {gameState==='SHOP'&&(
            <div className="glass rounded-3xl w-full max-w-sm pointer-events-auto shadow-2xl mx-4 flex flex-col anim-scale-in"
                 style={{maxHeight:'88vh',padding:'1.5rem',border:'1px solid rgba(6,182,212,.2)'}}>
              <h2 style={{fontFamily:"'Bebas Neue'",fontSize:36,color:'white',textAlign:'center',marginBottom:4,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><Bag c="w-6 h-6 text-cyan-400"/>{t.shopTitle}</h2>
              <p style={{color:'#64748b',textAlign:'center',fontSize:13,fontWeight:600,marginBottom:14}}>{t.customize}</p>
              <div style={{display:'flex',gap:8,marginBottom:16}}>
                {['skins','audio'].map(tab=>(
                  <button key={tab} onClick={()=>setShopTab(tab)} onMouseDown={e=>e.stopPropagation()}
                    style={{flex:1,padding:'10px',borderRadius:12,fontWeight:700,fontSize:13,cursor:'pointer',background:shopTab===tab?'#0e7490':'rgba(5,20,40,.8)',color:shopTab===tab?'white':'#64748b',border:`1px solid ${shopTab===tab?'rgba(6,182,212,.5)':'rgba(100,116,139,.3)'}`}}>
                    {tab==='skins'?t.skins:t.audio}
                  </button>
                ))}
              </div>
              <div className="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-1">
                {shopTab==='skins'&&SKINS.map(skin=>{
                  const isU=profile?.unlockedSkins.includes(skin.id),isSel=profile?.selectedSkin===skin.id,canA=(profile?.coins||0)>=skin.price;
                  return(
                    <div key={skin.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',borderRadius:14,border:`1px solid ${isSel?'rgba(6,182,212,.4)':'rgba(100,116,139,.2)'}`,background:isSel?'rgba(6,182,212,.08)':'rgba(5,13,26,.6)'}}>
                      <div style={{display:'flex',alignItems:'center',gap:12}}>
                        <div style={{width:42,height:42,borderRadius:10,background:'#09090b',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`inset 0 0 12px ${skin.color}44`}}>
                          <div style={{width:16,height:8,borderRadius:4,background:skin.color,boxShadow:`0 0 8px ${skin.color}`}}/>
                        </div>
                        <div>
                          <p style={{color:'white',fontWeight:600,fontSize:14}}>{skin.name}</p>
                          {!isU&&<p style={{color:canA?'#facc15':'#475569',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:3}}><CoinsIcon c="w-3 h-3"/>{skin.price}</p>}
                        </div>
                      </div>
                      {isSel
                        ?<span style={{color:'#06b6d4',fontWeight:700,fontSize:11,background:'rgba(6,182,212,.1)',padding:'4px 10px',borderRadius:99,border:'1px solid rgba(6,182,212,.2)'}}>{t.selected}</span>
                        :isU
                          ?<button onClick={()=>selectSkin(skin.id)} onMouseDown={e=>e.stopPropagation()} style={{background:'rgba(30,41,59,.8)',border:'1px solid rgba(100,116,139,.4)',color:'white',padding:'6px 14px',borderRadius:10,fontWeight:700,fontSize:12,cursor:'pointer'}}>{t.use}</button>
                          :<button onClick={()=>buySkin(skin.id,skin.price)} onMouseDown={e=>e.stopPropagation()} disabled={!canA} style={{background:canA?'#92400e':'rgba(30,41,59,.5)',color:canA?'#fde68a':'#475569',padding:'6px 14px',borderRadius:10,fontWeight:700,fontSize:12,cursor:canA?'pointer':'not-allowed',border:'none'}}>{t.buy}</button>
                      }
                    </div>
                  );
                })}
                {shopTab==='audio'&&(<>
                  <p style={{color:'#475569',fontWeight:700,fontSize:11,textTransform:'uppercase',letterSpacing:2,marginBottom:6}}>{t.music}</p>
                  {MUSIC_TRACKS.map(tr=>{const isU=profile?.unlockedMusic.includes(tr.id),isSel=profile?.selectedMusic===tr.id,canA=(profile?.coins||0)>=tr.price;return(<div key={tr.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',borderRadius:14,border:`1px solid ${isSel?'rgba(6,182,212,.4)':'rgba(100,116,139,.2)'}`,background:isSel?'rgba(6,182,212,.08)':'rgba(5,13,26,.6)',marginBottom:8}}><div style={{display:'flex',alignItems:'center',gap:10}}><MusicIco c="w-4 h-4 text-slate-400"/><div><p style={{color:'white',fontWeight:600,fontSize:14}}>{tr.name}</p>{!isU&&<p style={{color:canA?'#facc15':'#475569',fontSize:11,fontWeight:700}}>{tr.price} 🪙</p>}</div></div>{isSel?<span style={{color:'#06b6d4',fontWeight:700,fontSize:11,background:'rgba(6,182,212,.1)',padding:'4px 10px',borderRadius:99}}>{t.selected}</span>:isU?<button onClick={()=>selectAudio('music',tr.id)} onMouseDown={e=>e.stopPropagation()} style={{background:'rgba(30,41,59,.8)',border:'1px solid rgba(100,116,139,.4)',color:'white',padding:'6px 14px',borderRadius:10,fontWeight:700,fontSize:12,cursor:'pointer'}}>{t.use}</button>:<button onClick={()=>buyAudio('music',tr.id,tr.price)} onMouseDown={e=>e.stopPropagation()} disabled={!canA} style={{background:canA?'#92400e':'rgba(30,41,59,.5)',color:canA?'#fde68a':'#475569',padding:'6px 14px',borderRadius:10,fontWeight:700,fontSize:12,cursor:canA?'pointer':'not-allowed',border:'none'}}>{t.buy}</button>}</div>);})}
                  <p style={{color:'#475569',fontWeight:700,fontSize:11,textTransform:'uppercase',letterSpacing:2,margin:'12px 0 6px'}}>{t.deathPhrases}</p>
                  {DEATH_PHRASES.map(ph=>{const isU=profile?.unlockedDeathPhrases.includes(ph.id),isSel=profile?.selectedDeathPhrase===ph.id,canA=(profile?.coins||0)>=ph.price,phraseText=ph.texts[lang]||ph.texts['en'];return(<div key={ph.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',borderRadius:14,border:`1px solid ${isSel?'rgba(6,182,212,.4)':'rgba(100,116,139,.2)'}`,background:isSel?'rgba(6,182,212,.08)':'rgba(5,13,26,.6)',marginBottom:8}}><div style={{display:'flex',alignItems:'center',gap:10}}><MicIco c="w-4 h-4 text-slate-400"/><div><p style={{color:'white',fontWeight:600,fontSize:14}}>{ph.name}</p><p style={{color:'#475569',fontSize:11,fontStyle:'italic'}}>"{phraseText}"</p>{!isU&&<p style={{color:canA?'#facc15':'#475569',fontSize:11,fontWeight:700}}>{ph.price} 🪙</p>}</div></div>{isSel?<span style={{color:'#06b6d4',fontWeight:700,fontSize:11,background:'rgba(6,182,212,.1)',padding:'4px 10px',borderRadius:99}}>{t.selected}</span>:isU?<button onClick={()=>selectAudio('deathPhrase',ph.id)} onMouseDown={e=>e.stopPropagation()} style={{background:'rgba(30,41,59,.8)',border:'1px solid rgba(100,116,139,.4)',color:'white',padding:'6px 14px',borderRadius:10,fontWeight:700,fontSize:12,cursor:'pointer'}}>{t.use}</button>:<button onClick={()=>buyAudio('deathPhrase',ph.id,ph.price)} onMouseDown={e=>e.stopPropagation()} disabled={!canA} style={{background:canA?'#92400e':'rgba(30,41,59,.5)',color:canA?'#fde68a':'#475569',padding:'6px 14px',borderRadius:10,fontWeight:700,fontSize:12,cursor:canA?'pointer':'not-allowed',border:'none'}}>{t.buy}</button>}</div>);})}
                </>)}
              </div>
              <button onClick={()=>setGameState('START')} onMouseDown={e=>e.stopPropagation()}
                style={{marginTop:16,background:'rgba(30,41,59,.8)',border:'1px solid rgba(100,116,139,.3)',color:'white',padding:'14px',borderRadius:16,fontWeight:700,fontSize:15,cursor:'pointer',width:'100%'}}>
                {t.menu}
              </button>
            </div>
          )}

          {/* GAME OVER */}
          {gameState==='GAME_OVER'&&(
            <div className="fixed inset-0 z-50 flex flex-col items-center justify-center p-4 pointer-events-auto"
                 style={{background:'radial-gradient(ellipse at center, rgba(127,29,29,.9) 0%, rgba(5,13,26,.97) 100%)'}}>
              {sessionStats.isNewRecord&&(
                <div style={{fontFamily:"'Bebas Neue'",color:'#fbbf24',fontSize:22,letterSpacing:4,marginBottom:8,textShadow:'0 0 20px #fbbf24'}} className="anim-scale-in">
                  ✦ {t.newRecord} ✦
                </div>
              )}
              <h1 style={{fontFamily:"'Bebas Neue'",color:'white',fontSize:'clamp(42px,10vw,80px)',letterSpacing:4,textShadow:'0 0 30px rgba(239,68,68,.7)',marginBottom:20,textAlign:'center'}}>
                {t.gameOver}
              </h1>
              <div className="glass w-full max-w-sm shadow-2xl" style={{borderRadius:24,padding:'1.5rem',border:'1px solid rgba(100,116,139,.2)'}}>
                {/* Grade + score */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:24,marginBottom:20}}>
                  <div className={`anim-grade-pop ${grade.cls}`} style={{fontFamily:"'Bebas Neue'",fontSize:88,color:grade.col,lineHeight:1}}>{grade.l}</div>
                  <div>
                    <p style={{fontFamily:"'Bebas Neue'",fontSize:40,color:'white',lineHeight:1}}>{score}</p>
                    <p style={{color:'#64748b',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>{t.score}</p>
                    <p style={{fontSize:12,fontWeight:700,marginTop:4,color:grade.col}}>{grade.label}</p>
                  </div>
                </div>
                {/* Stats */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
                  {[
                    {label:t.bestScore,val:profile?.highScore||0,col:'#facc15'},
                    {label:t.maxCombo,val:`×${sessionStats.maxCombo}`,col:'#f97316'},
                    {label:t.obstacles,val:sessionStats.obstacles,col:'#06b6d4'},
                  ].map(s=>(
                    <div key={s.label} style={{background:'rgba(5,13,26,.7)',border:'1px solid rgba(100,116,139,.2)',borderRadius:12,padding:'10px 8px',textAlign:'center'}}>
                      <p style={{fontFamily:"'Bebas Neue'",fontSize:24,color:s.col,lineHeight:1}}>{s.val}</p>
                      <p style={{color:'#475569',fontSize:10,fontWeight:700,marginTop:2}}>{s.label}</p>
                    </div>
                  ))}
                </div>
                {/* Coins earned */}
                <div style={{background:'rgba(234,179,8,.05)',border:'1px solid rgba(234,179,8,.15)',borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                  <span style={{color:'#94a3b8',fontSize:13,fontWeight:600}}>Monete guadagnate</span>
                  <span style={{color:'#facc15',fontWeight:700,fontSize:14,display:'flex',alignItems:'center',gap:4}}><CoinsIcon c="w-4 h-4"/>+{sessionStats.coins}</span>
                </div>
                {/* Buttons */}
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  <button onClick={startGame} onMouseDown={e=>e.stopPropagation()}
                    style={{fontFamily:"'Bebas Neue'",fontSize:28,color:'white',padding:'14px',borderRadius:16,background:'linear-gradient(135deg,#0891b2,#10b981)',border:'none',cursor:'pointer',boxShadow:'0 0 20px rgba(6,182,212,.3)'}}>
                    {t.retry}
                  </button>
                  <div style={{display:'flex',gap:10}}>
                    <button onClick={()=>setGameState('START')} onMouseDown={e=>e.stopPropagation()}
                      style={{flex:1,background:'rgba(30,41,59,.8)',border:'1px solid rgba(100,116,139,.3)',color:'white',padding:'12px',borderRadius:14,fontWeight:700,fontSize:14,cursor:'pointer'}}>
                      {t.menu}
                    </button>
                    <button onClick={shareScore} onMouseDown={e=>e.stopPropagation()}
                      style={{flex:1,background:'rgba(37,99,235,.15)',border:'1px solid rgba(59,130,246,.3)',color:'#93c5fd',padding:'12px',borderRadius:14,fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                      <Share2 c="w-4 h-4"/>{t.share}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* HUD during play */}
        {isPlaying&&(
          <div className="absolute inset-0 pointer-events-none z-10">
            <div className="absolute top-0 right-0 flex flex-col items-end gap-2"
                 style={{padding:'max(12px,env(safe-area-inset-top)) 12px 0 0'}}>
              <div style={{display:'flex',gap:8}}>
                <div style={{background:'rgba(5,13,26,.8)',backdropFilter:'blur(10px)',border:'1px solid rgba(234,179,8,.2)',borderRadius:999,padding:'6px 12px',display:'flex',alignItems:'center',gap:6}}>
                  <CoinsIcon c="w-4 h-4 text-yellow-400"/>
                  <span style={{color:'white',fontWeight:700,fontSize:14}}>{coins}</span>
                </div>
                <div style={{background:'rgba(5,13,26,.8)',backdropFilter:'blur(10px)',border:'1px solid rgba(100,116,139,.3)',borderRadius:999,padding:'6px 16px',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{color:'#64748b',fontWeight:700,fontSize:11,letterSpacing:2}}>{t.score}</span>
                  <span style={{fontFamily:"'Bebas Neue'",color:'white',fontSize:28,lineHeight:1}}>{score}</span>
                </div>
              </div>
              {combo>=2&&(
                <div className="anim-combo-pop" style={{background:`${tier.col}22`,border:`1px solid ${tier.col}55`,borderRadius:999,padding:'5px 14px',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontFamily:"'Bebas Neue'",fontSize:16,color:tier.col,lineHeight:1}}>COMBO</span>
                  <span style={{fontFamily:"'Bebas Neue'",fontSize:24,color:tier.col,lineHeight:1,textShadow:`0 0 10px ${tier.col}`}}>×{combo}</span>
                  {tier.mul>1&&<span style={{fontWeight:700,fontSize:11,color:tier.col}}>{tier.label}</span>}
                </div>
              )}
              {activePowerUp&&(
                <div style={{background:`${PC[activePowerUp]||'#fff'}22`,border:`1px solid ${PC[activePowerUp]||'#fff'}44`,borderRadius:999,padding:'5px 16px',animation:'glowPulse 1.5s infinite'}}>
                  <span style={{fontFamily:"'Bebas Neue'",fontSize:16,color:PC[activePowerUp]||'#fff',letterSpacing:1}}>
                    {PW[activePowerUp]||activePowerUp}
                  </span>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Achievement popups */}
        <div style={{position:'absolute',bottom:24,left:'50%',transform:'translateX(-50%)',display:'flex',flexDirection:'column',gap:8,alignItems:'center',pointerEvents:'none',zIndex:60,width:'90%',maxWidth:340}}>
          {achQueue.slice(0,3).map((ach,i)=>(
            <AchievementPopup key={ach.id+'-'+i} ach={ach} onDone={()=>setAchQueue(q=>q.filter((_,j)=>j!==0))}/>
          ))}
        </div>
      </div>
    </ErrorBoundary>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
